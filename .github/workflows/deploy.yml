name: "Publish to GitHub Pages"
on:
  push:
    branches:
      - main

# Give the workflow explicit permission to issue a native live deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deployments by canceling old ones if you push rapidly
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Completely obliterate any old local tracking states
      - name: Clean Local Workspace
        run: rm -rf .godot/ .import/ build/

      - name: Log Godot Version
        run: echo "Building with Godot 4.x"

      # 2. Re-import everything fresh in the runner workspace
      - name: Headless Godot Import
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip Godot_v4.6.3-stable_linux.x86_64.zip
          ./Godot_v4.6.3-stable_linux.x86_64 --headless --editor --import || true
          rm Godot_v4.6.3-stable_linux.x86_64 Godot_v4.6.3-stable_linux.x86_64.zip

      # 3. Export, but with the cache strictly recognized
      - name: Export Web Build
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          use_godot_3_exec: false

      # 4. Prevent GitHub Pages from ignoring files starting with underscores
      - name: Create .nojekyll
        run: |
          mkdir -p build/web
          touch build/web/.nojekyll

      # 5. Upload the exported Web files as a Pages artifact
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      # 6. Deploy the artifact to live GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4