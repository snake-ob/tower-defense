name: "Godot HTML5 Export"

on:
  push:
    branches:
      - main

# Grant permissions needed for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    name: Export and Deploy Game
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Godot Engine
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot
          key: godot-4.7-stable-linux

      - name: Download Godot 4.7 & Templates Manual Override
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot
          
          # 1. Download the correct editor binary with the dot (.) naming structure
          curl -L -o ~/.local/share/godot/godot.zip https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          
          # 2. Extract the editor binary
          unzip ~/.local/share/godot/godot.zip -d ~/.local/share/godot/
          
          # 3. Rename the binary to match the underscore (_) expected by the export action
          mv ~/.local/share/godot/Godot_v4.7-stable_linux.x86_64 ~/.local/share/godot/Godot_v4.7-stable_linux_x86_64
          
          # Clean up zip file
          rm ~/.local/share/godot/godot.zip

      - name: Run Godot Export
        uses: firebelley/godot-export@v6.0.0
        with:
          # Match the exact URLs we bypass to keep the action's internal validation happy
          godot_executable_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz"
          relative_project_path: "./" # Change this if your project.godot is in a subdirectory
          archive_export_output: true
          # Replace 'Web' with the exact name of your export preset in export_presets.cfg
          export_preset_name: "Web" 

      # Optional: Auto-deploy to GitHub Pages if you are exporting an HTML5/Web build
      - name: Upload Artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the default output directory of the firebelley action
          path: /home/runner/.local/share/godot/builds/Web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4