name: "Publish to GitHub Pages"
on:
  push:
    branches:
      - main

# Give the workflow explicit permission to issue a native live deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deployments by canceling old ones if you push rapidly
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. WIPE CACHE FIRST: Forces Godot to look at your fresh changes right away
      - name: Clear Godot Import Cache
        run: rm -rf .godot/ .import/

      - name: Log Godot Version
        run: echo "Building with Godot 4.x"

      # 2. EXPORT: Godot compiles the fresh assets
      - name: Export Web Build
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
        
      - name: Patch for SharedArrayBuffer Support
        run: |
          sed -i 's|<script>|<script src="coi-serviceworker.js"></script><script>|g' build/web/index.html
          cat << 'EOF' > build/web/coi-serviceworker.js
          if (typeof window === 'undefined') {
              self.addEventListener('install', () => self.skipWaiting());
              self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
              self.addEventListener('fetch', (e) => {
                  if (e.request.cache === 'only-if-cached' && e.request.mode !== 'same-origin') return;
                  e.respondWith(
                      fetch(e.request).then((r) => {
                          if (r.status === 0) return r;
                          const h = new Headers(r.headers);
                          h.set('Cross-Origin-Embedder-Policy', 'require-corp');
                          h.set('Cross-Origin-Opener-Policy', 'same-origin');
                          return new Response(r.body, { status: r.status, statusText: r.statusText, headers: h });
                      }).catch((err) => console.error(err))
                  );
              });
          }
          EOF

      # 3. UPLOAD: Securely bundle up your fresh web folder
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      # 4. DEPLOY: Hand the clean artifact directly to the web servers
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4