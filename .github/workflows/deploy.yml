name: "Publish to GitHub Pages"
on:
  push:
    branches:
      - main  # Change this to master if that is your default branch

env:
  GODOT_VERSION: "4.7.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      # Explicitly forces the standard (non-C#) Godot engine download 
      - name: Setup Godot (Standard Engine)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-mono: false # Force standard version to allow Web exports

      # Performs the headless export using the configured "Web" preset
      - name: Export Web Build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      # Essential workaround for GitHub Pages: injects COI service worker to enable SharedArrayBuffer
      - name: Inject COI Service Worker
        run: |
          cd build/web
          wget https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js
          sed -i 's|<script|& src="coi-serviceworker.js"|' index.html

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages