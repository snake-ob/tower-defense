name: "Publish to GitHub Pages"
on:
  push:
    branches:
      - main  # Change this to master if that is your default branch

env:
  GODOT_VERSION: "4.7"
  EXPORT_NAME: "index"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install & Run Godot Export
        uses: firebelley/godot-export@v6.0.0
        with:
          # Pulls directly from GitHub's CDN to avoid TuxFamily timeouts
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          use_preset_export_path: true 

      # Essential workaround for GitHub Pages: injects COI service worker to enable SharedArrayBuffer
      - name: Inject COI Service Worker
        run: |
          cd build/web
          wget https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js
          sed -i 's|<script|& src="coi-serviceworker.js"|' index.html

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages